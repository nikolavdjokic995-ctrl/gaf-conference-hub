<!DOCTYPE html>
<html>
<head>
    <title>Delete submission</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f8;
            margin:0;
        }

        .box{
            max-width:600px;
            margin:100px auto;
            background:white;
            padding:40px;
            border-radius:16px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        h1{
            color:#991b1b;
        }

        .buttons{
            display:flex;
            gap:15px;
            margin-top:30px;
        }

        button{
            background:#dc2626;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:10px;
            font-weight:bold;
            cursor:pointer;
        }

        a{
            text-decoration:none;
            padding:12px 20px;
            border-radius:10px;
            background:#e5e7eb;
            color:#111827;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="box">

    <h1>Delete submission</h1>

    <p>
        Are you sure you want to permanently delete:
    </p>

    <strong>
        {{ submission.title }}
    </strong>

    <div class="buttons">

        <form method="post">
            {% csrf_token %}
            <button type="submit">
                Delete
            </button>
        </form>

        <a href="{% url 'conference_submissions' submission.conference.slug %}">
            Cancel
        </a>

    </div>

</div>

</body>
</html>
