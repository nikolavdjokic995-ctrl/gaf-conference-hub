<!DOCTYPE html>
<html>
<head>
    <title>Email preview</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; color: #102a43; }
        .topbar { background: #1f4e79; color: white; padding: 22px 40px; }
        .container { max-width: 850px; margin: 35px auto; padding: 0 20px; }
        .panel { background: white; padding: 24px; border-radius: 14px; box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
        .body { white-space: pre-wrap; background: #f8fafc; padding: 16px; border-radius: 10px; border: 1px solid #e5e7eb; line-height: 1.5; }
        .btn { display: inline-block; margin-top: 16px; padding: 10px 14px; background: #1f4e79; color: white; text-decoration: none; border-radius: 6px; }
    </style>
</head>
<body>
<div class="topbar">
    <h1>Email preview</h1>
    <p>{{ template.get_event_display }}</p>
</div>
<div class="container">
    <div class="panel">
        <p><strong>Subject:</strong> {{ preview.subject }}</p>
        <div class="body">{{ preview.body }}</div>
        <a class="btn" href="{% url 'email_templates' conference.slug %}">Back to email settings</a>
    </div>
</div>
</body>
</html>
