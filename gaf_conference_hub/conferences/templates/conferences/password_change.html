<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change password | GAF Conference Hub</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f7f5;
            color: #102018;
        }
        .topbar {
            background: #0f5b2f;
            color: white;
            padding: 22px 40px;
            font-size: 24px;
            font-weight: 700;
        }
        .wrap {
            max-width: 560px;
            margin: 48px auto;
            background: white;
            border-radius: 18px;
            padding: 34px 38px;
            box-shadow: 0 14px 34px rgba(0, 0, 0, .08);
            border: 1px solid #dcebe2;
        }
        h1 {
            color: #0f5b2f;
            margin: 0 0 8px;
            font-size: 28px;
        }
        .hint {
            color: #65756b;
            margin-bottom: 26px;
        }
        label {
            display: block;
            margin: 16px 0 6px;
            font-weight: 700;
            color: #0f5b2f;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border: 1px solid #cfded5;
            border-radius: 10px;
            font-size: 15px;
        }
        .errorlist {
            color: #b42318;
            background: #fff1f0;
            border: 1px solid #ffd0cc;
            border-radius: 10px;
            padding: 10px 14px;
            list-style-position: inside;
        }
        .helptext, .helptext ul {
            color: #6d7a72;
            font-size: 13px;
            line-height: 1.5;
            padding-left: 16px;
        }
        .actions {
            margin-top: 28px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        button, .back {
            border: 0;
            border-radius: 10px;
            padding: 12px 18px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }
        button {
            background: #16a34a;
            color: white;
        }
        .back {
            background: #eef6f1;
            color: #0f5b2f;
        }
    </style>
</head>
<body>
    <div class="topbar">GAF Conference Hub</div>

    <main class="wrap">
        <h1>Change password</h1>
        <p class="hint">Update your account password. After saving, you will remain logged in.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}

            {% for field in form %}
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}
                {% if field.help_text %}
                    <div class="helptext">{{ field.help_text|safe }}</div>
                {% endif %}
            {% endfor %}

            <div class="actions">
                <button type="submit">Save new password</button>
                <a class="back" href="{% url 'home' %}">Back</a>
            </div>
        </form>
    </main>
</body>
</html>
