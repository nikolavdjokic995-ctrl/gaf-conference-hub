<!DOCTYPE html>
<html>
<head>
    <title>Edit footer partner</title>
    <style>
        body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;color:#111827}
        .topbar{background:#14532d;color:white;padding:28px 45px}
        .container{max-width:850px;margin:36px auto;background:white;padding:30px;border-radius:18px;box-shadow:0 8px 26px rgba(0,0,0,.08)}
        h1{color:#14532d}
        label{display:block;font-weight:bold;color:#14532d;margin-bottom:7px}
        input{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:12px;padding:12px;font-size:15px}
        form p{margin-bottom:18px}
        .btn{display:inline-block;background:#16a34a;color:white;text-decoration:none;border:0;border-radius:10px;padding:11px 16px;font-weight:bold;cursor:pointer}
        .btn-dark{background:#374151}
    </style>
</head>
<body>
<div class="topbar">
    <h1>Edit footer partner</h1>
</div>

<div class="container">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn" type="submit">Save partner</button>
        <a class="btn btn-dark" href="{% url 'footer_settings' conference.slug %}">
            ← Back to footer settings
        </a>
    </form>
</div>
</body>
</html>
