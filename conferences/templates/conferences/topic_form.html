<h1>
    {% if form.instance.id %}
        Edit topic
    {% else %}
        Add topic
    {% endif %}
</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Save topic</button>
</form>

<p>
    <a href="{% url 'conference_topics' conference.slug %}">Back</a>
</p>
