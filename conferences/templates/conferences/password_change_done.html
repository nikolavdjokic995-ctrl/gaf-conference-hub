<!DOCTYPE html>
<html lang="en">

            color: white;

        }
        .wrap {
            max-width: 560px;
            margin: 48px auto;

            padding: 34px 38px;

        h1 {
            color: #0f5b2f;
            margin: 0 0 12px;
            font-size: 28px;
        }
        p {

            line-height: 1.6;
        }
        a {
            display: inline-block;
            margin-top: 16px;
            background: #16a34a;

            text-decoration: none;
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: 700;
        }

    <div class="topbar">GAF Conference Hub</div>

    <main class="wrap">
        <h1>Password changed</h1>
