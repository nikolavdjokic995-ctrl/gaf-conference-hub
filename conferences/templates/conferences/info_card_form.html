<h1>
    {% if form.instance.id %}
        Edit information card
    {% else %}
        Add information card
    {% endif %}
</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Save card</button>
</form>

<p>
    <a href="{% url 'important_information' conference.slug %}">Back</a>
</p>
