<!DOCTYPE html>
<html>
<head>
    <title>Login - GAF Conference Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        .header {
            background: #218794;
            color: white;
            padding: 20px 30px;
            font-size: 22px;
            font-weight: bold;
        }

        .login-box {
            width: 360px;
            margin: 80px auto;
            background: white;
            padding: 28px;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 6px 0 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 11px;
            background: #218794;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        a {
            display: block;
            margin-top: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="header">GAF Conference Hub</div>

<div class="login-box">
    <h2>Login</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Login</button>
    </form>

    <a href="/">Back to home</a>
</div>

</body>
</html>
