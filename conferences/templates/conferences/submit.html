<!DOCTYPE html>
<html>
<head>
    <title>Submit paper</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        .topbar {
            background: #14532d;
            color: white;
            padding: 20px 40px;
            font-size: 28px;
            font-weight: bold;
        }

        .container {
            max-width: 750px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            margin-top: 0;
            color: #14532d;
        }

        form p {
            margin-bottom: 20px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 6px;
            box-sizing: border-box;
        }

        button {
            background: #16a34a;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background: #15803d;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #14532d;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="topbar">
    GAF Conference Hub
</div>

<div class="container">

    <h1>
        Submit paper for {{ conference.title_en }}
    </h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Submit Paper
        </button>
    </form>

    <a class="back-link"
       href="{% url 'conference_overview' conference.slug %}">
        ← Back to conference
    </a>

</div>

</body>
</html>
